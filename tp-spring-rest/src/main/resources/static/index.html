<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Catalogue de Produits</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Inclusion de jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Inclusion de Bootstrap pour un meilleur style -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Gestion de Catalogue de Produits</h1>
        
        <div class="row">
            <!-- Section Consultation -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3>Consulter les Produits</h3>
                    </div>
                    <div class="card-body">
                        <button id="btnConsulterTous" class="btn btn-primary mb-3">
                            Consulter Tous les Produits
                        </button>
                        <div class="mb-3">
                            <label for="numProduitConsult" class="form-label">Numéro du Produit :</label>
                            <div class="input-group">
                                <input type="number" id="numProduitConsult" class="form-control" placeholder="Entrez le numéro">
                                <button id="btnConsulterUn" class="btn btn-info">Consulter</button>
                            </div>
                        </div>
                        <div id="resultatConsultation" class="mt-3">
                            <!-- Résultats affichés ici -->
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Section Ajout -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3>Ajouter un Produit</h3>
                    </div>
                    <div class="card-body">
                        <form id="formAjout">
                            <div class="mb-3">
                                <label for="nomProduit" class="form-label">Nom du Produit :</label>
                                <input type="text" id="nomProduit" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="categorieProduit" class="form-label">Catégorie :</label>
                                <input type="text" id="categorieProduit" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success">
                                Ajouter avec Paramètres
                            </button>
                            <button type="button" id="btnAjoutJSON" class="btn btn-secondary">
                                Ajouter avec JSON
                            </button>
                        </form>
                        <div id="resultatAjout" class="mt-3">
                            <!-- Résultats affichés ici -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <!-- Section Suppression -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header bg-danger text-white">
                        <h3>Supprimer un Produit</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="numProduitSupp" class="form-label">Numéro du Produit :</label>
                            <div class="input-group">
                                <input type="number" id="numProduitSupp" class="form-control" placeholder="Entrez le numéro">
                                <button id="btnSupprimer" class="btn btn-danger">Supprimer</button>
                            </div>
                        </div>
                        <div id="resultatSuppression" class="mt-3">
                            <!-- Résultats affichés ici -->
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Section Options de Format -->
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h3>Options de Format</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Format de Réponse :</label>
                            <select id="formatReponse" class="form-select">
                                <option value="application/json">JSON</option>
                                <option value="application/xml">XML</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Format de Contenu (pour POST JSON) :</label>
                            <select id="formatContenu" class="form-select">
                                <option value="application/json">JSON</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Section pour afficher les produits sous forme de tableau -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <h3>Liste des Produits</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>Numéro</th>
                                        <th>Nom</th>
                                        <th>Catégorie</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="tableauProduits">
                                    <!-- Les produits seront affichés ici -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Inclusion du script JavaScript -->
    <script src="js/app.js"></script>
    <!-- Inclusion de Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
